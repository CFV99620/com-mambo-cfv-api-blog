spring:
  application:
    name: api.blog

  datasource:
    url: jdbc:postgresql://localhost:5432/CfvBlog
    username: postgres
    password: [PASSWORD]

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

logging:
  level:
    org.flywaydb: DEBUG